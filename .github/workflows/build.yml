name: Build Installer

on:
    push:
        tags: ["v*"]
    workflow_dispatch:

env:
    DOTNET_NOLOGO: true
    DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
    build:
        name: Build xiansAsepriteInstaller.exe
        runs-on: windows-2022

        steps:
            - name: 📥 Checkout
              uses: actions/checkout@v4

            - name: 🔧 Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            # Native AOT is built into .NET 10 — no workload install needed.
            # The windows-2022 runner includes VS 2022 with C++ tools (MSVC linker).

            - name: 📦 Restore dependencies
              run: dotnet restore src/AsepriteInstaller/AsepriteInstaller.csproj

            - name: 🏗️ Build (AOT publish)
              run: |
                  dotnet publish src/AsepriteInstaller/AsepriteInstaller.csproj `
                    -c Release `
                    -r win-x64 `
                    -o dist `
                    /p:PublishAot=true

            - name: 📊 Show output
              shell: pwsh
              run: |
                  Get-ChildItem dist -Filter "*.exe" | Format-Table Name, @{N='SizeMB';E={[math]::Round($_.Length/1MB,2)}}

            - name: 📄 Copy uninstall script
              shell: pwsh
              run: |
                  Copy-Item uninstall.ps1 dist\ -Force

            - name: ⬆️ Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: xiansAsepriteInstaller-win-x64
                  path: |
                      dist/xiansAsepriteInstaller.exe
                      dist/uninstall.ps1
                  if-no-files-found: error
                  retention-days: 30

    release:
        name: Create Release
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: 📥 Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: xiansAsepriteInstaller-win-x64
                  path: release

            - name: 🏷️ Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  generate_release_notes: true
                  files: |
                      release/xiansAsepriteInstaller.exe
                      release/uninstall.ps1
                  body: |
                      ## xian's Aseprite Installer ${{ github.ref_name }}

                      > ⚠️ Unofficial community tool — NOT affiliated with Igara Studio S.A.
                      > 💚 Consider [purchasing the official Aseprite](https://aseprite.org) to support the developers.

                      ### 📦 Downloads

                      | File | Description |
                      |------|-------------|
                      | `xiansAsepriteInstaller.exe` | Installer (~8 MB, single-file, no runtime needed) |
                      | `uninstall.ps1` | Uninstall script |

                      ### 🚀 Usage

                      1. Download `xiansAsepriteInstaller.exe`
                      2. Double-click to run
                      3. Select language → Accept EULA → Follow prompts

                      ### 🗑️ Uninstall

                      ```powershell
                      # Download uninstall.ps1 from this release, then:
                      .\uninstall.ps1           # Interactive
                      .\uninstall.ps1 -All      # Remove everything including build cache
                      ```

                      ### 📋 Requirements

                      - Windows 10 1809+ / Windows 11 (x64)
                      - Internet connection
                      - ~5 GB free disk space
                      - Admin privileges (only for system-scope install or auto VS install)
